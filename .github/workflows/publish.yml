name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without v prefix"
        required: true
  push:
    tags:
      - "__manual_publish_registration_only__"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: chmod +x bin/liferay-mcp.js
      - name: Use npm 11
        run: npm install -g npm@11
      - name: Use npm trusted publishing auth
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          unset NODE_AUTH_TOKEN
      - name: Set package versions
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
          node scripts/prepare-platform-packages.js
      - name: Download private Go release artifacts
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_RELEASE_TOKEN }}
        run: |
          mkdir -p artifacts extracted binaries
          gh release download "v${{ inputs.version }}" \
            --repo VittorGuih/liferay-mcp-go \
            --dir artifacts
          for archive in artifacts/*.tar.gz artifacts/*.zip; do
            [ -e "$archive" ] || continue
            base="$(basename "$archive")"
            base="${base%.tar.gz}"
            base="${base%.zip}"
            target="extracted/$base"
            mkdir -p "$target"
            case "$archive" in
              *.tar.gz) tar -xzf "$archive" -C "$target" ;;
              *.zip) unzip -oq "$archive" -d "$target" ;;
            esac
            os="$(echo "$base" | awk -F_ '{print $(NF-1)}')"
            arch="$(echo "$base" | awk -F_ '{print $NF}')"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            binary="$(find "$target" -type f -name "liferay-mcp${ext}" | head -1)"
            if [ -z "$binary" ]; then
              echo "Missing binary in $archive" >&2
              exit 1
            fi
            cp "$binary" "binaries/liferay-mcp_${{ inputs.version }}_${os}_${arch}${ext}"
          done
      - name: Prepare platform packages
        run: node scripts/prepare-platform-packages.js
        env:
          LIFERAY_MCP_BINARY_DIR: binaries
      - name: Test wrapper
        run: |
          npm test
          npm pack --dry-run
      - name: Publish platform packages
        run: |
          publish_package() {
            local dir="$1"
            local package_name
            local package_version
            package_name="$(node -p "require('./${dir}/package.json').name")"
            package_version="$(node -p "require('./${dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; already published."
              return
            fi
            npm publish "./$dir" --access public --provenance
          }
          for dir in packages/liferay-mcp-*; do
            publish_package "$dir"
          done
      - name: Publish wrapper
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "Skipping ${package_name}@${package_version}; already published."
          else
            npm publish --access public --provenance
          fi
      - name: Public release note
        run: |
          echo "npm publish complete for v${{ inputs.version }}."
          echo "Public GitHub release creation is intentionally omitted because this workflow uses contents: read for Trusted Publishing."
